name: Carregar temas oficiais (Camara)

# Busca a classificacao tematica OFICIAL de cada proposicao que tem votacao
# nominal (/proposicoes/{id}/temas) e grava em proposition_theme.
# Permite achar as votacoes de um assunto sem depender de palavra-chave.
# E resumivel: rodar de novo so busca o que falta.
on:
  workflow_dispatch:

concurrency:
  group: ingest-congresso
  cancel-in-progress: false

jobs:
  themes:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r ingest/requirements.txt

      - name: Carregar temas das proposicoes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ingest/enrich_themes.py
