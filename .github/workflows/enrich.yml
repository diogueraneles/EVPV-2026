name: Enriquecer assuntos (Camara)

# Preenche o assunto (proposicao + ementa) das votacoes que ainda estao sem,
# usando o detalhe /votacoes/{id}. Roda sob demanda, sem re-ingerir tudo.
on:
  workflow_dispatch:

concurrency:
  group: ingest-congresso
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60          # falha rapido em vez de queimar 6h
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r ingest/requirements.txt

      - name: Enriquecer proposicoes das votacoes nominais
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ingest/enrich_propositions.py
